<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COA Master Revision System | GTU Sem 4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  /* Premium Dark Luxury tokens */
  --bg:        #050507;
  --bg2:       #0a0a0f;
  --bg3:       #0f0f18;
  --card:      #111120;
  --card2:     #16162a;
  --bdr:       #1e1e36;
  --bdr2:      #282840;

  /* Accent palette — gold + violet + crimson */
  --gold:      #c9a84c;
  --gold2:     #e8c96a;
  --gold-dim:  rgba(201,168,76,.12);
  --gold-glow: rgba(201,168,76,.06);
  --violet:    #7b68ee;
  --violet-dim:rgba(123,104,238,.15);
  --crimson:   #e63946;
  --crimson-dim:rgba(230,57,70,.12);
  --emerald:   #2dd4a0;
  --emerald-dim:rgba(45,212,160,.12);
  --sky:       #60b4ff;
  --sky-dim:   rgba(96,180,255,.12);

  /* Text */
  --txt:  #e8e8f0;
  --txt2: #8888aa;
  --txt3: #4a4a66;

  /* Radii */
  --r:  14px;
  --rs: 8px;
  --rp: 100px;

  /* Sidebar width */
  --sb: 270px;
}

body{
  background:var(--bg);
  color:var(--txt);
  font-family:'Inter',system-ui,sans-serif;
  font-size:14px;
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* ─── TOPBAR ─── */
.topbar{
  background:var(--bg2);
  border-bottom:1px solid var(--bdr);
  height:56px;
  display:flex;
  align-items:center;
  gap:14px;
  padding:0 20px;
  flex-shrink:0;
  z-index:100;
  position:relative;
}
.topbar::after{
  content:'';
  position:absolute;
  bottom:0; left:0; right:0;
  height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  opacity:.25;
}

.logo{
  font-family:'Oswald',system-ui,sans-serif;
  font-size:18px;
  font-weight:600;
  letter-spacing:2px;
  text-transform:uppercase;
  white-space:nowrap;
  color:var(--txt);
}
.logo em{
  font-style:normal;
  color:var(--gold);
}

.topbar-divider{width:1px;height:22px;background:var(--bdr2);flex-shrink:0}

/* Search */
.srch-wrap{flex:1;max-width:320px;position:relative}
.srch{
  width:100%;
  background:var(--bg3);
  border:1px solid var(--bdr2);
  border-radius:var(--rp);
  padding:8px 14px 8px 36px;
  color:var(--txt);
  font-size:12.5px;
  outline:none;
  font-family:'Inter',inherit;
  letter-spacing:.3px;
  transition:border-color .2s, box-shadow .2s;
}
.srch::placeholder{color:var(--txt3)}
.srch:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.08)}
.si{
  position:absolute;left:12px;top:50%;
  transform:translateY(-50%);
  color:var(--txt3);
  font-size:13px;
  pointer-events:none;
}

/* Nav pills */
.nav-pills{display:flex;gap:6px;margin-left:auto}
.np{
  font-family:'Inter',inherit;
  font-size:12px;
  font-weight:500;
  letter-spacing:.4px;
  padding:6px 16px;
  border-radius:var(--rp);
  border:1px solid var(--bdr2);
  background:transparent;
  color:var(--txt2);
  cursor:pointer;
  transition:all .2s;
  text-transform:uppercase;
}
.np:hover{color:var(--txt);border-color:var(--bdr2);background:var(--bg3)}
.np.on{background:var(--gold);border-color:var(--gold);color:#0a0800;font-weight:700}
.np.rev{border-color:var(--violet-dim)}
.np.rev:hover{border-color:var(--violet);color:var(--violet)}
.np.rev.on{background:var(--violet);border-color:var(--violet);color:#fff}

/* ─── LAYOUT ─── */
.body{display:flex;flex:1;overflow:hidden}

/* ─── SIDEBAR ─── */
.sb{
  width:var(--sb);
  min-width:var(--sb);
  background:var(--bg2);
  border-right:1px solid var(--bdr);
  overflow-y:auto;
  padding:14px 10px;
  height:calc(100vh - 56px);
}
.sb-lbl{
  font-family:'Oswald',sans-serif;
  font-size:9px;
  font-weight:500;
  text-transform:uppercase;
  letter-spacing:2.5px;
  color:var(--txt3);
  padding:0 8px;
  margin:10px 0 6px;
}

/* Question row in sidebar */
.qi{
  display:flex;
  align-items:center;
  gap:9px;
  padding:8px 9px;
  border-radius:var(--rs);
  cursor:pointer;
  border:1px solid transparent;
  transition:all .15s;
}
.qi:hover{background:var(--bg3);border-color:var(--bdr)}
.qi.on{background:var(--gold-dim);border-color:rgba(201,168,76,.3)}
.qi.on .qt{color:var(--txt)}
.qn{
  font-family:'JetBrains Mono',monospace;
  font-size:9.5px;
  font-weight:600;
  color:var(--gold);
  min-width:24px;
}
.qt{font-size:11.5px;color:var(--txt2);flex:1;line-height:1.3}
.qb{font-size:9px;font-weight:700;padding:2px 7px;border-radius:var(--rp)}
.b7{background:var(--crimson-dim);color:var(--crimson)}
.b4{background:var(--gold-dim);color:var(--gold)}
.b3{background:var(--emerald-dim);color:var(--emerald)}

/* ─── CONTENT ─── */
.content{
  flex:1;
  overflow-y:auto;
  padding:24px;
  background:var(--bg);
}

/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--gold);opacity:.5}

/* ─── HERO ─── */
.hero{
  background:linear-gradient(135deg,var(--bg3) 0%,var(--card) 100%);
  border:1px solid var(--bdr2);
  border-radius:var(--r);
  padding:32px;
  margin-bottom:20px;
  position:relative;
  overflow:hidden;
}
.hero::before{
  content:'';
  position:absolute;top:-60px;right:-60px;
  width:260px;height:260px;
  background:radial-gradient(circle,rgba(201,168,76,.08) 0%,transparent 70%);
  pointer-events:none;
}
.hero::after{
  content:'';
  position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  opacity:.2;
}

.htag{
  display:inline-block;
  font-family:'Oswald',sans-serif;
  font-size:10px;
  font-weight:400;
  letter-spacing:2.5px;
  text-transform:uppercase;
  color:var(--gold);
  background:var(--gold-dim);
  border:1px solid rgba(201,168,76,.2);
  padding:4px 14px;
  border-radius:var(--rp);
  margin-bottom:14px;
}

.htitle{
  font-family:'Oswald',system-ui,sans-serif;
  font-size:34px;
  font-weight:600;
  letter-spacing:1px;
  text-transform:uppercase;
  line-height:1.05;
  margin-bottom:10px;
  color:var(--txt);
}
.htitle em{font-style:normal;color:var(--gold)}

.hdesc{color:var(--txt2);font-size:13px;line-height:1.7;margin-bottom:22px;max-width:580px}

.stats{display:flex;gap:28px;flex-wrap:wrap}
.stat .sn{
  font-family:'Oswald',sans-serif;
  font-size:30px;
  font-weight:700;
  color:var(--gold);
  letter-spacing:1px;
  line-height:1;
}
.stat .sl{
  font-size:9.5px;
  color:var(--txt3);
  text-transform:uppercase;
  letter-spacing:2px;
  margin-top:3px;
}

/* ─── SECTION TITLE ─── */
.sec-title{
  font-family:'Oswald',sans-serif;
  font-size:10px;
  font-weight:400;
  letter-spacing:2.5px;
  text-transform:uppercase;
  color:var(--txt3);
  margin:20px 0 10px;
  display:flex;
  align-items:center;
  gap:10px;
}
.sec-title::after{content:'';flex:1;height:1px;background:var(--bdr)}

/* ─── UNIT GRID ─── */
.ugrid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:10px;
  margin-bottom:18px;
}
.ucard{
  background:var(--card);
  border:1px solid var(--bdr);
  border-radius:var(--r);
  padding:16px;
  cursor:pointer;
  transition:all .22s;
  position:relative;
  overflow:hidden;
}
.ucard::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  opacity:0;
  transition:opacity .22s;
}
.ucard:hover{border-color:rgba(201,168,76,.3);transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,.4)}
.ucard:hover::before{opacity:.4}
.uico{font-size:22px;margin-bottom:8px}
.unm{
  font-family:'Oswald',sans-serif;
  font-size:13px;
  font-weight:500;
  letter-spacing:.5px;
  text-transform:uppercase;
  color:var(--txt);
  margin-bottom:3px;
}
.ucnt{font-size:11px;color:var(--txt3)}

/* ─── HIGH PRIORITY ITEMS ─── */
.hq-item{
  background:var(--card);
  border:1px solid var(--bdr);
  border-radius:var(--rs);
  padding:11px 16px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:7px;
  transition:all .18s;
}
.hq-item:hover{border-color:rgba(201,168,76,.3);background:var(--card2)}
.hqn{
  font-family:'JetBrains Mono',monospace;
  font-size:12px;
  font-weight:600;
  color:var(--gold);
  min-width:28px;
}

/* ─── QUESTION HEADER ─── */
.qhdr{
  background:var(--card);
  border:1px solid var(--bdr2);
  border-radius:var(--r);
  padding:20px;
  margin-bottom:16px;
  position:relative;
  overflow:hidden;
}
.qhdr::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--gold),var(--violet),transparent);
}

.qmeta{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.chip{
  font-family:'JetBrains Mono',monospace;
  font-size:10.5px;
  font-weight:600;
  padding:3px 10px;
  border-radius:var(--rp);
}
.chip-q{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(201,168,76,.2)}
.chip-hi{background:var(--crimson-dim);color:var(--crimson)}
.chip-med{background:var(--gold-dim);color:var(--gold)}
.chip-lo{background:var(--emerald-dim);color:var(--emerald)}

.qtitle{
  font-family:'Oswald',sans-serif;
  font-size:19px;
  font-weight:500;
  letter-spacing:.5px;
  line-height:1.3;
  margin-bottom:10px;
  color:var(--txt);
}
.tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{
  font-size:10px;
  background:var(--bg3);
  color:var(--txt3);
  padding:2px 9px;
  border-radius:var(--rp);
  border:1px solid var(--bdr);
  letter-spacing:.3px;
}

/* ─── TABS ─── */
.tabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.tb{
  font-family:'Inter',inherit;
  font-size:11.5px;
  font-weight:500;
  padding:7px 14px;
  border-radius:var(--rs);
  border:1px solid var(--bdr);
  background:var(--card);
  color:var(--txt2);
  cursor:pointer;
  transition:all .18s;
  letter-spacing:.2px;
}
.tb:hover{border-color:var(--bdr2);color:var(--txt);background:var(--card2)}
.tb.on{background:var(--gold);border-color:var(--gold);color:#0a0800;font-weight:700}

/* ─── PANELS ─── */
.panel{
  background:var(--card);
  border:1px solid var(--bdr2);
  border-radius:var(--r);
  padding:18px;
  margin-bottom:12px;
}
.ptitle{
  font-family:'Oswald',sans-serif;
  font-size:10px;
  font-weight:400;
  letter-spacing:2.5px;
  text-transform:uppercase;
  margin-bottom:14px;
  display:flex;
  align-items:center;
  gap:8px;
}
.ptitle::after{content:'';flex:1;height:1px;background:var(--bdr)}
.ptitle.blu{color:var(--sky)}
.ptitle.gold{color:var(--gold)}
.ptitle.grn{color:var(--emerald)}
.ptitle.pur{color:var(--violet)}
.ptitle.red{color:var(--crimson)}

/* Definition box */
.def{
  font-size:13.5px;
  line-height:1.75;
  background:var(--bg3);
  padding:14px 16px;
  border-radius:var(--rs);
  border-left:2px solid var(--gold);
  margin-bottom:14px;
  color:var(--txt);
}

/* Key points list */
.pts{list-style:none}
.pts li{
  font-size:13px;
  color:var(--txt2);
  line-height:1.65;
  padding:6px 0 6px 18px;
  position:relative;
  border-bottom:1px solid var(--bdr);
}
.pts li:last-child{border-bottom:none}
.pts li::before{
  content:'▸';
  position:absolute;left:0;
  color:var(--gold);
  font-size:10px;
  top:8px;
}

/* Diagram / code block */
.diag{
  background:#020204;
  border:1px solid #1a1a2e;
  border-radius:var(--rs);
  padding:14px 16px;
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  color:#7ecfcf;
  line-height:1.8;
  white-space:pre;
  overflow-x:auto;
}

/* Keywords */
.kws{display:flex;flex-wrap:wrap;gap:8px}
.kw{
  font-family:'JetBrains Mono',monospace;
  font-size:10.5px;
  font-weight:500;
  padding:4px 11px;
  border-radius:var(--rp);
  background:var(--violet-dim);
  color:var(--violet);
  border:1px solid rgba(123,104,238,.2);
}

/* EL10 */
.el10p{
  background:linear-gradient(135deg,#0d0b00,#141000);
  border:1px solid rgba(201,168,76,.18);
  border-radius:var(--r);
  padding:18px;
  margin-bottom:12px;
}
.el10l{font-size:13.5px;color:#e8d88a;line-height:1.8;padding:3px 0}

/* Flashcards */
.fcard{
  background:var(--bg3);
  border:1px solid var(--bdr);
  border-radius:var(--rs);
  overflow:hidden;
  margin-bottom:9px;
  transition:border-color .18s;
}
.fcard:hover{border-color:rgba(201,168,76,.25)}
.fq{
  background:var(--sky-dim);
  padding:10px 14px;
  font-size:12.5px;
  font-weight:500;
  color:var(--sky);
  border-bottom:1px solid rgba(96,180,255,.1);
}
.fa{padding:10px 14px;font-size:13px;color:var(--txt);line-height:1.55}

/* Quick hacks */
.sc{
  font-size:13px;
  padding:10px 14px;
  border-left:2px solid var(--violet);
  background:var(--bg3);
  margin-bottom:7px;
  border-radius:0 var(--rs) var(--rs) 0;
  color:var(--txt);
  line-height:1.55;
}

/* Exam version */
.ev{
  font-size:12.5px;
  padding:8px 0;
  border-bottom:1px solid var(--bdr);
  color:var(--txt);
  font-family:'JetBrains Mono',monospace;
  line-height:1.55;
}
.ev:last-child{border-bottom:none}
.exam-wrap{
  background:linear-gradient(135deg,#020d08,#040f0a);
  border:1px solid rgba(45,212,160,.2);
  border-radius:var(--r);
  padding:18px;
}

/* Revision table */
.rev-row{
  display:flex;
  gap:10px;
  align-items:flex-start;
  padding:10px 12px;
  border-bottom:1px solid var(--bdr);
  border-radius:var(--rs);
  transition:background .15s;
  cursor:pointer;
}
.rev-row:hover{background:var(--card2)}
.rev-q{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  font-weight:700;
  color:var(--gold);
  min-width:28px;
  margin-top:2px;
}
.rev-t{font-size:12px;color:var(--txt2);min-width:150px;max-width:150px;line-height:1.4}
.rev-a{font-size:11.5px;color:var(--txt);font-family:'JetBrains Mono',monospace;line-height:1.55;flex:1}

/* Nav arrows */
.qnav{display:flex;gap:8px;margin-top:16px}
.qnb{
  flex:1;
  padding:11px;
  background:var(--card);
  border:1px solid var(--bdr);
  border-radius:var(--rs);
  cursor:pointer;
  font-family:'Inter',inherit;
  color:var(--txt2);
  font-size:12px;
  font-weight:500;
  transition:all .18s;
  text-align:center;
  letter-spacing:.3px;
}
.qnb:hover{border-color:var(--gold);color:var(--gold)}

/* ─── RESPONSIVE ─── */
@media(max-width:720px){
  .sb{display:none}
  .content{padding:16px}
  .htitle{font-size:24px}
}
</style>
</head>
<body>

<!-- ░░ TOPBAR ░░ -->
<div class="topbar">
  <div class="logo">COA <em>Revision</em></div>
  <div class="topbar-divider"></div>
  <div class="srch-wrap">
    <span class="si">⌕</span>
    <input class="srch" id="srch" placeholder="Search questions, topics..." oninput="doSearch()">
  </div>
  <div class="nav-pills">
    <button class="np on" id="nb-home" onclick="setView('home')">Home</button>
    <button class="np" id="nb-qs" onclick="setView('questions')">Questions</button>
    <button class="np rev" id="nb-rev" onclick="setView('revision')">⚡ Revision</button>
  </div>
</div>

<!-- ░░ BODY ░░ -->
<div class="body">
  <div class="sb" id="sidebar"></div>
  <div class="content" id="content"></div>
</div>

<script>
// ════════════════════════════════════════════
//  DATA — all 24 questions (unchanged)
// ════════════════════════════════════════════
const QS=[
{id:1,marks:7,pri:"high",unit:"I/O & Interrupts",tags:["interrupt","ISR","IEN","cycle"],
title:"What is an Interrupt? Explain interrupt cycle with flowchart.",
def:"An interrupt is a hardware or software signal that forces the CPU to temporarily pause its current program, save its state, and execute a special routine called the Interrupt Service Routine (ISR). After the ISR completes, the CPU resumes the original program.",
pts:["Types: Hardware (I/O devices), Software (INT instruction), Internal (overflow, divide-by-zero)","IEN (Interrupt Enable Flip-Flop): Must be 1 for CPU to accept interrupts","ISR: Special code that handles the device's request","Return Address: Saved to stack/memory location 0 so CPU can return","Key Registers: PC (Program Counter), IEN, Stack Pointer"],
diag:`  Fetch → Decode → Execute
                    |
         [Check Interrupt?]
        /                  \\
   IEN=0?              IEN=1 & Pending?
  (No INT)                  |
                    Save PC → Stack
                    IEN ← 0
                    PC  ← ISR Address
                    Execute ISR
                    Restore PC, IEN ← 1
                    Return to Program`,
kws:["Interrupt","ISR","IEN","PC","Stack","Fetch-Decode-Execute"],
el10:["🏠 Imagine doing homework (CPU executing program).","Suddenly mom calls you — that's an interrupt!","You bookmark your homework (save PC to stack),","go answer mom (execute ISR), then continue (restore PC).","IEN = 0 means Do Not Disturb mode is ON."],
fc:[["What is an interrupt?","Signal that pauses CPU to handle urgent event, then resumes program."],["What is ISR?","Interrupt Service Routine — special code that handles the interrupt."],["What does IEN do?","IEN=1 allows interrupts; IEN=0 disables them."],["Where is return address saved?","Memory location 0 or top of stack."],["Interrupt cycle sequence?","Execute → Check IEN → Save PC → IEN=0 → Jump ISR → Restore PC → IEN=1"],["Hardware vs software interrupt?","Hardware: from I/O device. Software: from INT instruction."],["What if IEN=0 when interrupt arrives?","CPU ignores interrupt and continues current program."]],
sh:["⚡ Mnemonic: SIRE = Save PC → IEN=0 → Run ISR → Enable IEN","⚡ Exam trap: Always say 'IEN=0 to prevent nested interrupts during ISR'","⚡ 5 steps: Check → Save → Disable → Execute ISR → Restore","⚡ Think: Pause → Bookmark → Handle → Resume"],
ev:["Definition: Signal to CPU to pause and execute ISR.","Steps:","1. CPU finishes current instruction.","2. Checks: IEN=1 AND interrupt pending?","3. YES: Save PC to stack, set IEN=0.","4. Load ISR address into PC.","5. Execute ISR.","6. Restore PC, set IEN=1. Return to program.","Types: Hardware, Software, Internal (overflow)."]},
{id:2,marks:7,pri:"high",unit:"Assembler",tags:["assembler","pass2","symbol table","machine code"],
title:"Draw and briefly explain flowchart for Second Pass of Assembler.",
def:"The Second Pass translates the intermediate file (from Pass 1) into final machine code (object code). It uses the Symbol Table built in Pass 1 to resolve all label addresses.",
pts:["Input: Intermediate file from Pass 1 + Symbol Table","Output: Object file (binary machine code)","MRI: Opcode + address from Symbol Table + I-bit","Non-MRI: Register/IO instructions translated directly","I-bit: Set if indirect addressing mode is used"],
diag:`  [Start Pass 2]
  Read next line from Intermediate File
  [Pseudo Instruction?]→YES→ Process (ORG/DEC/END)
      |NO
  [MRI?]→YES→ Lookup Symbol Table
      |        → Assemble: Opcode + Address + I-bit
      |NO
  [Non-MRI]→ Use Opcode Table directly
  Write machine code to Object File
  [END?]→YES→ Stop | NO→ next line`,
kws:["Pass 2","Symbol Table","MRI","Object Code","Opcode","I-bit","Indirect"],
el10:["📚 Pass 1 was a scout who made a MAP (symbol table).","Pass 2 is the builder who uses that MAP to build the house (machine code).","For every instruction: 'LOOP is at address 150? Put 150 in machine code!'","MRI = need memory address. Non-MRI = no address needed."],
fc:[["What does Pass 2 take as input?","Intermediate file + Symbol Table from Pass 1."],["What does Pass 2 produce?","Object file — final binary machine code."],["What is an MRI?","Memory Reference Instruction — needs a memory address."],["What is the I-bit?","Indirect bit — set to 1 if instruction uses indirect addressing."],["How is Non-MRI handled?","Translated using predefined opcode table, no address needed."],["What does END do?","Signals end of assembly — terminates Pass 2."]],
sh:["⚡ Mnemonic: PMON = Pseudo? MRI? Opcode+Addr? Non-MRI?","⚡ Pass 1 = Build Symbol Table. Pass 2 = USE it.","⚡ Draw 4-decision flowchart for full marks","⚡ MRI: [Opcode 3bits][I-bit 1bit][Address 12bits] = 16-bit word"],
ev:["Definition: Pass 2 translates to machine code using Symbol Table.","1. Read line from intermediate file.","2. Pseudo? (ORG/DEC/END) → Process.","3. MRI? → Opcode + Symbol Table address + I-bit.","4. Non-MRI? → Predefined opcode table.","5. Write to object file.","6. Repeat until END."]},
{id:3,marks:7,pri:"high",unit:"Instruction Set",tags:["addressing modes","immediate","direct","indirect","indexed"],
title:"Explain any seven addressing modes with appropriate examples.",
def:"Addressing Modes define HOW an instruction locates its operand — whether the operand is in the instruction itself, a register, a memory location, or accessed via a pointer.",
pts:["1. Immediate: Operand IN instruction. MOV AL,5. No memory lookup.","2. Register: Operand in CPU register. MOV AX,BX. Fastest.","3. Direct: Instruction has exact address. LDA 2050.","4. Indirect: Address-of-address. ADD @R0. Two memory reads!","5. Register Indirect: Register holds address. MOV AX,[BX].","6. Relative: EA = PC + Offset. JMP +5. Used for jumps.","7. Indexed: EA = Base + Index Register. ARRAY[SI]. For arrays."],
diag:`  Mode         | EA Calculation   | Speed   | Use
  -------------|-----------------|---------|------
  Immediate    | Operand IN instr | Fastest | Constants
  Register     | Operand IN reg   | V.Fast  | Temp vars
  Direct       | EA = Address     | Fast    | Global vars
  Indirect     | EA = M[Address]  | Slow    | Pointers
  Reg Indirect | EA = M[Reg]      | Medium  | Pointers
  Relative     | EA = PC + offset | Medium  | Branches
  Indexed      | EA = Base+Index  | Medium  | Arrays`,
kws:["EA","Immediate","Direct","Indirect","Register","Relative","Indexed","Operand"],
el10:["🔍 Finding a book = finding an operand in memory.","Immediate = 'Book is IN my hands!' (no lookup, fastest)","Register = 'Book in my desk drawer' — fast!","Direct = 'Book at shelf #205' — go directly.","Indirect = 'Shelf #205 has a note: Go to shelf #410' — two trips!","Indexed = 'Start shelf 200 + index 5 = shelf 205' — great for arrays!"],
fc:[["Effective Address (EA)?","Actual memory address where operand is located."],["Immediate mode?","Operand IS the data — no EA calculation."],["Relative mode formula?","EA = PC + Signed Offset."],["Indexed mode formula?","EA = Base Address + Index Register contents."],["Best mode for arrays?","Indexed Addressing Mode."],["Which mode has 2 memory reads?","Indirect Mode."],["Fastest mode?","Register Mode — operand already in CPU register."]],
sh:["⚡ Speed order: Reg > Imm > Direct > Indexed > Relative > Reg-Indirect > Indirect","⚡ Exam trap: 'Indirect needs 2 memory reads' — always mention!","⚡ Indexed = ARRAYS. Relative = JUMPS. Remember!"],
ev:["7 Addressing Modes:","1. Immediate: Operand in instruction. MOV AL,5.","2. Register: Operand in register. MOV AX,BX.","3. Direct: EA = address in instruction. LDA 2050.","4. Indirect: EA = M[address]. Two memory reads.","5. Register Indirect: EA = M[Reg]. MOV AX,[BX].","6. Relative: EA = PC + offset. JMP +5.","7. Indexed: EA = Base + Index. ARRAY[SI]."]},
{id:4,marks:7,pri:"high",unit:"Parallel Processing",tags:["Flynn's taxonomy","SISD","SIMD","MISD","MIMD"],
title:"Explain Flynn's classification of computer architecture.",
def:"Flynn's Taxonomy classifies computer architectures based on the number of simultaneous instruction streams and data streams: SISD, SIMD, MISD, and MIMD.",
pts:["SISD: Single Instruction Single Data — classic von Neumann. Sequential.","SIMD: Single Instruction Multiple Data — one instruction on many data. GPU, vector.","MISD: Multiple Instruction Single Data — rare/theoretical. Fault-tolerant systems.","MIMD: Multiple Instruction Multiple Data — independent CPUs. Modern multiprocessors.","Real-world: GPU = SIMD. Clusters = MIMD. Classic PC = SISD."],
diag:`  Instruction   | Single Data        | Multiple Data
  Streams       |                    |
  --------------|--------------------|-----------------
  Single        | SISD               | SIMD
  Instruction   | (Classic PC)       | (GPU, SSE)
  --------------|--------------------|-----------------
  Multiple      | MISD               | MIMD
  Instruction   | (Fault-tolerant)   | (SMP, Cluster)`,
kws:["Flynn","SISD","SIMD","MISD","MIMD","Instruction Stream","Data Stream","Parallel"],
el10:["👨‍🍳 SISD = one chef, one dish. Classic cooking.","SIMD = one recipe, 100 chefs cook same dish simultaneously. GPU!","MISD = 100 different recipes, all for one dish? Weird but exists.","MIMD = 100 chefs, 100 dishes, 100 recipes. Modern supercomputer!"],
fc:[["Flynn's taxonomy basis?","Number of instruction and data streams."],["SISD?","Single Instruction, Single Data — sequential. Classic CPU."],["SIMD?","Single Instruction, Multiple Data — parallel data. GPU."],["MISD?","Multiple Instruction, Single Data — rare, fault-tolerant."],["MIMD?","Multiple Instruction, Multiple Data — modern multiprocessor."],["Most common modern?","MIMD — SMP, clusters."]],
sh:["⚡ Remember: IS × DS matrix. 2×2 = 4 types.","⚡ SIMD = GPU (best exam example!)","⚡ MIMD = clusters/SMP (most common real-world)","⚡ Draw 2×2 table for full marks!"],
ev:["Flynn's Taxonomy — based on Instruction × Data streams:","SISD: 1 instr, 1 data. Sequential. Traditional PC.","SIMD: 1 instr, multiple data. GPU, vector processors.","MISD: Multiple instr, 1 data. Rare — pipeline, fault tolerance.","MIMD: Multiple instr, multiple data. SMP, cluster, distributed.","| | Single Data | Multiple Data |","| Single Instr | SISD | SIMD |","| Multiple Instr | MISD | MIMD |"]},
{id:5,marks:7,pri:"high",unit:"CPU Architecture",tags:["RISC","CISC","pipeline","hardwired","ARM","x86"],
title:"Differentiate RISC and CISC architecture.",
def:"RISC (Reduced Instruction Set Computer) uses simple, fixed-length instructions optimized for pipeline execution. CISC (Complex Instruction Set Computer) uses complex, variable-length instructions that do more per instruction.",
pts:["RISC: Simple instructions, fixed length, 1 cycle, hardwired, load/store only, many registers.","CISC: Complex instructions, variable length, multi-cycle, microprogrammed, memory operands.","RISC pipeline: each stage takes 1 cycle → efficient pipelining.","CISC advantage: fewer instructions needed, backward compatible.","Examples: RISC=ARM,MIPS,SPARC. CISC=x86,x86-64,8086."],
diag:`  Feature         | RISC            | CISC
  ----------------|-----------------|------------------
  Instructions    | Simple, fixed   | Complex, variable
  Execution       | 1 clock cycle   | Multiple cycles
  Control         | Hardwired       | Microprogrammed
  Registers       | Many (32+)      | Few (8-16)
  Memory access   | Load/Store only | Any instruction
  Code size       | Larger          | Smaller
  Pipeline        | Efficient       | Difficult
  Examples        | ARM, MIPS       | x86, 8086`,
kws:["RISC","CISC","Pipeline","Hardwired","Microprogrammed","ARM","x86","Load-Store"],
el10:["🍽️ RISC = fast food. Simple menu, one item at a time, FAST!","CISC = fine dining. Complex meals, chef does everything, slower but powerful.","RISC: ARM in your phone. Fast, power efficient.","CISC: x86 in your PC. Complex, backward compatible, powerful."],
fc:[["RISC full form?","Reduced Instruction Set Computer."],["CISC full form?","Complex Instruction Set Computer."],["RISC execution time?","1 clock cycle per instruction."],["CISC control unit?","Microprogrammed."],["RISC control unit?","Hardwired — faster."],["RISC memory access?","Only Load and Store instructions."],["Examples: RISC?","ARM, MIPS, SPARC, PowerPC."],["Examples: CISC?","x86, 8086, x86-64."]],
sh:["⚡ RISC=Reduced=Register=1cycle=Hardwired=ARM","⚡ CISC=Complex=Code=MultiCycle=Micro=x86","⚡ Draw 8-row comparison table!","⚡ Pipeline works best with RISC — say why!"],
ev:["RISC vs CISC comparison:","| Feature | RISC | CISC |","| Instructions | Simple, fixed | Complex, variable |","| Execution | 1 cycle | Multi-cycle |","| Control | Hardwired | Microprogrammed |","| Registers | Many (32+) | Few |","| Memory | Load/Store only | Any instruction |","| Examples | ARM, MIPS | x86, 8086 |"]},
{id:6,marks:7,pri:"high",unit:"I/O & Interrupts",tags:["DMA","direct memory access","burst","cycle steal","CPU bypass"],
title:"Explain DMA (Direct Memory Access) with modes of DMA transfer.",
def:"DMA is a technique allowing I/O devices to transfer data directly to/from memory without CPU involvement, freeing the CPU for other tasks.",
pts:["DMA Controller (DMAC): Separate hardware. Manages transfer. CPU initializes it.","Cycle Stealing: DMAC steals one bus cycle per byte. CPU slows slightly.","Burst Mode: DMAC takes full bus control for entire block. CPU halted temporarily.","Transparent Mode: DMAC uses bus only when CPU doesn't need it. No CPU slowdown.","Steps: CPU → DMAC (address, count, direction) → DMAC does transfer → interrupt CPU when done."],
diag:`  CPU → [DMAC] ← I/O Device
         ↕
       Memory
  
  Modes:
  Burst:       DMAC steals entire bus — CPU HALTED
  Cycle Steal: DMAC steals 1 cycle/byte — CPU slows
  Transparent: DMAC uses unused bus cycles — CPU unaffected`,
kws:["DMA","DMAC","Cycle Steal","Burst","Transparent","Bus","Memory","I/O"],
el10:["📦 DMA = delivery person bypassing manager (CPU).","Without DMA: you (CPU) carry every box yourself. Slow!","With DMA: hire a deliveryman (DMAC). Just tell him what to deliver.","Burst = delivery van takes road briefly. You wait.","Cycle Steal = deliveryman sneaks by when you're not looking. You barely notice!"],
fc:[["What is DMA?","Direct Memory Access — I/O transfers without CPU."],["DMA Burst mode?","DMAC controls bus entirely — CPU halted during transfer."],["DMA Cycle Steal?","DMAC steals one bus cycle per byte — CPU slows slightly."],["DMA Transparent?","DMAC uses bus only when CPU idle — no CPU impact."],["Who initializes DMA?","CPU sets up address, count, direction in DMAC registers."],["What happens when DMA done?","DMAC sends interrupt to CPU."]],
sh:["⚡ 3 modes: Burst=full; Cycle Steal=per-byte; Transparent=idle","⚡ DMA advantage: CPU free during transfer","⚡ 'CPU initializes DMAC registers' — mention this!","⚡ DMAC sends interrupt when done — important!"],
ev:["DMA = I/O↔Memory transfer without CPU.","CPU Programs DMAC: Start address, byte count, direction.","Burst Mode: DMAC seizes bus → transfer block → interrupt. CPU halted.","Cycle Steal: DMAC steals 1 bus cycle per byte. CPU slowed.","Transparent: DMAC transfers only during CPU idle cycles. No impact.","Advantage: CPU free to execute other programs during I/O."]},
{id:7,marks:7,pri:"high",unit:"I/O & Interrupts",tags:["handshaking","asynchronous","data transfer","ACK","strobe"],
title:"Explain asynchronous data transfer with handshaking.",
def:"Asynchronous data transfer using handshaking allows two devices operating at different speeds to synchronize data exchange using control signals (Strobe/Data Valid and ACK).",
pts:["No common clock — sender and receiver synchronize via control signals.","Source Initiated: Sender places data → asserts Data Valid → waits for ACK.","Destination Initiated: Receiver asserts Ready → Sender places data and strobe.","Handshake eliminates need for matching clock speeds.","5-step sequence ensures reliable transfer."],
diag:`  SOURCE INITIATED HANDSHAKE:
  1. Source places data on bus
  2. Source asserts DATA-VALID
  3. Destination reads data → asserts ACK
  4. Source removes data → de-asserts DATA-VALID
  5. Destination de-asserts ACK → ready for next`,
kws:["Handshaking","Asynchronous","Strobe","ACK","Data Valid","Source Initiated","Destination Initiated"],
el10:["🤝 Handshaking = polite conversation protocol!","You say 'Data ready!' (Data Valid).","Friend says 'Got it!' (ACK).","You stop sending. Friend ready for next.","Like email: send → read confirmation → send next!"],
fc:[["Asynchronous transfer?","Transfer without common clock — uses handshake signals."],["Data Valid signal?","Sender signal indicating data is ready on bus."],["ACK signal?","Receiver signal confirming data received."],["Source initiated?","Sender drives transfer by asserting Data Valid first."],["Why asynchronous?","Allows devices of different speeds to communicate."]],
sh:["⚡ 5-step: Place→DataValid→ACK→Remove→DropACK","⚡ No clock needed — speed independent!","⚡ Draw timing diagram for full marks","⚡ 'Handshake eliminates clock mismatch' — say this!"],
ev:["Asynchronous Handshake (Source Initiated):","1. Source places data on bus.","2. Source asserts DATA-VALID.","3. Destination reads data, asserts ACK.","4. Source de-asserts DATA-VALID, removes data.","5. Destination de-asserts ACK.","Advantage: Works with any speed devices. No shared clock needed."]},
{id:8,marks:7,pri:"high",unit:"Arithmetic",tags:["Booth's algorithm","multiplication","2's complement","signed"],
title:"Explain Booth's algorithm for signed multiplication.",
def:"Booth's Algorithm multiplies two signed binary numbers using 2's complement representation, examining pairs of bits to decide add, subtract, or shift.",
pts:["Operates on 2's complement signed numbers.","Compare current bit Q[0] and previous bit Q[-1].","00 or 11: Just shift (no operation).","10: Subtract Multiplicand (A = A - M), then shift.","01: Add Multiplicand (A = A + M), then shift.","n iterations for n-bit numbers. Result in A|Q register pair."],
diag:`  Q0 Q-1 | Operation
  -------|----------
  0   0  | Shift only (no add/sub)
  1   1  | Shift only (no add/sub)
  0   1  | A = A + M, then Shift
  1   0  | A = A - M, then Shift
  
  Registers: A(Accumulator) | Q(Multiplier) | Q-1(1-bit)`,
kws:["Booth's Algorithm","2's Complement","Signed Multiplication","Accumulator","Shift","Q-1"],
el10:["🔢 Booth = smart multiplication shortcut!","Instead of adding M every time, use patterns.","00 or 11 = do nothing, just shift.","01 = add M then shift.","10 = subtract M then shift.","Handles SIGNED numbers automatically!"],
fc:[["Booth's 00 operation?","Shift right only — no add or subtract."],["Booth's 01 operation?","A = A + M, then Arithmetic Right Shift."],["Booth's 10 operation?","A = A - M (add 2's complement), then shift."],["Booth's 11 operation?","Shift right only."],["What registers used?","A (accumulator), Q (multiplier), Q-1 (1 extra bit)."],["How many iterations?","n iterations for n-bit operands."]],
sh:["⚡ 00/11=shift; 01=add+shift; 10=sub+shift","⚡ Arithmetic right shift (preserve sign)!","⚡ Q-1 starts as 0","⚡ Always check: Q[0] and Q[-1] PAIR!"],
ev:["Booth's Algorithm (signed multiplication):","Initialize: A=0, Q-1=0, Q=multiplier, M=multiplicand.","For each of n iterations:","  Q0=0,Q-1=1 → A=A+M","  Q0=1,Q-1=0 → A=A-M (2's comp)","  Q0=Q-1 (00 or 11) → no operation","  Arithmetic Right Shift A|Q|Q-1.","Result in A|Q after n iterations."]},
{id:9,marks:7,pri:"high",unit:"Arithmetic",tags:["Booth's example","5x4","multiplication","binary"],
title:"Multiply 5×4 using Booth's Algorithm.",
def:"Apply Booth's Algorithm to multiply 5 (0101) × 4 (0100) in 4-bit signed binary.",
pts:["M = 0101 (5), Q = 0100 (4), A = 0000, Q-1 = 0","Iteration 1: Q0=0,Q-1=0 → Shift → A=0000,Q=0010,Q-1=0","Iteration 2: Q0=0,Q-1=0 → Shift → A=0000,Q=0001,Q-1=0","Iteration 3: Q0=1,Q-1=0 → A=A-M=1011 → Shift → A=1101,Q=1000,Q-1=1","Iteration 4: Q0=0,Q-1=1 → A=A+M=0010 → Shift → A=0001,Q=0100,Q-1=0","Result: A|Q = 00010100 = 20 ✓ (5×4=20)"],
diag:`  M=0101, -M=1011(2's comp)
  
  Step | Q0 Q-1| Op      | A     | Q    | Q-1
  -----|-------|---------|-------|------|----
  Init |       |         | 0000  | 0100 |  0
  1    | 0  0  | Shift   | 0000  | 0010 |  0
  2    | 0  0  | Shift   | 0000  | 0001 |  0
  3    | 1  0  | A-M,Sh  | 1101  | 1000 |  1
  4    | 0  1  | A+M,Sh  | 0001  | 0100 |  0
  
  Result: A|Q = 0001 0100 = 20 ✓`,
kws:["Booth's Example","5×4","20","Binary Multiplication","Iteration"],
el10:["📊 Just like doing 5×4=20 but in binary!","Each step: look at last 2 bits, add or subtract, then shift.","4 steps for 4-bit numbers.","Final A|Q = 00010100 = 20. It works!"],
fc:[["M in Booth's 5×4?","M=0101 (multiplicand=5)."],["Q in Booth's 5×4?","Q=0100 (multiplier=4)."],["Result after 4 iterations?","A|Q = 00010100 = 20."],["-M (2's complement of 5)?","1011."],["Iteration 3 operation?","Q0=1,Q-1=0 → A=A-M, then shift."],["Iteration 4 operation?","Q0=0,Q-1=1 → A=A+M, then shift."]],
sh:["⚡ Always show 5-column table: Step|Q0Q-1|Op|A|Q|Q-1","⚡ -M = 2's complement of M. Compute at start!","⚡ Final answer = A|Q concatenated","⚡ Verify: 5×4=20=0b00010100 ✓"],
ev:["Booth's Multiplication: 5(0101) × 4(0100)","M=0101, -M=1011, A=0000, Q=0100, Q-1=0","Step 1: Q0Q-1=00 → Shift → A=0000,Q=0010,Q-1=0","Step 2: Q0Q-1=00 → Shift → A=0000,Q=0001,Q-1=0","Step 3: Q0Q-1=10 → A=A-M=1011→Shift → A=1101,Q=1000,Q-1=1","Step 4: Q0Q-1=01 → A=A+M=0010→Shift → A=0001,Q=0100","Result: A|Q=00010100=20 ✓"]},
{id:10,marks:4,pri:"high",unit:"Assembler",tags:["assembly program","ORG","HLT","LDA","ADD","STA"],
title:"Write an assembly language program to add two numbers.",
def:"Assembly program to compute C = A + B using basic instructions: ORG (origin), LDA (load), ADD, STA (store), HLT (halt), DEC (data declarations).",
pts:["ORG 100: Start program at address 100.","LDA A: Load value of A into Accumulator.","ADD B: Add value of B to Accumulator.","STA C: Store result from Accumulator to memory C.","HLT: Stop program execution.","DEC declarations: A DEC 5, B DEC 3, C DEC 0."],
diag:`  ORG 100      / Program starts at address 100
  LDA A        / ACC = value of A (= 5)
  ADD B        / ACC = ACC + B (= 5+3=8)
  STA C        / Memory[C] = ACC (= 8)
  HLT          / Stop
  A, DEC 5     / A = 5
  B, DEC 3     / B = 3
  C, DEC 0     / C = result (initially 0)
  END          / End of program`,
kws:["ORG","LDA","ADD","STA","HLT","DEC","END","Accumulator","Assembly"],
el10:["📝 Assembly = very precise recipe for CPU.","ORG = 'Start cooking at station 100'.","LDA = 'Pick up ingredient A'.","ADD = 'Mix with ingredient B'.","STA = 'Put result in bowl C'.","HLT = 'Stop cooking!'"],
fc:[["LDA instruction?","Load accumulator with value from memory."],["ADD instruction?","ACC = ACC + memory value."],["STA instruction?","Store accumulator value to memory."],["HLT?","Halt — stops program execution."],["DEC directive?","Declares a decimal constant in memory."],["ORG directive?","Sets starting address for program."]],
sh:["⚡ ORG; LDA A; ADD B; STA C; HLT; DEC declarations","⚡ Always add / comments — shows understanding!","⚡ DEC = memory variable. ORG = start address.","⚡ Remember: LDA loads, STA stores."],
ev:["Program: C = A + B","ORG 100 / start at 100","LDA A   / ACC = A","ADD B   / ACC = A+B","STA C   / C = result","HLT     / stop","A, DEC 5 | B, DEC 3 | C, DEC 0","END"]},
{id:11,marks:7,pri:"high",unit:"CPU Architecture",tags:["hardwired","control unit","microprogrammed","RISC","CISC"],
title:"Differentiate between Hardwired and Microprogrammed Control Unit.",
def:"Hardwired Control Unit: logic implemented with fixed combinational circuits — fast but inflexible. Microprogrammed: uses microprogram (ROM) to generate control signals — flexible but slower.",
pts:["Hardwired: finite state machine, gates/flip-flops, cannot be modified after fabrication.","Hardwired: faster execution — direct hardware signals.","Microprogrammed: control signals stored as microinstructions in ROM (Control Memory).","Microprogrammed: easy to design, modify, support complex instructions.","Microprogrammed: used in CISC (x86). Hardwired in RISC (ARM)."],
diag:`  HARDWIRED:               MICROPROGRAMMED:
  IR → Decoder             IR → Control Memory (ROM)
       ↓                        ↓
  Combinational Logic      Microinstruction Register
       ↓                        ↓
  Control Signals          Control Signals
  
  Fast, Fixed              Flexible, Slower`,
kws:["Hardwired","Microprogrammed","Control Unit","Microinstruction","ROM","RISC","CISC"],
el10:["⚙️ Hardwired = hard-coded app. Super fast, can't update.","Microprogrammed = web app. Slower, but update by just changing code!","Hardwired → RISC (ARM phones).","Microprogrammed → CISC (x86 PC)."],
fc:[["Hardwired CU?","Combinational logic circuits — fixed, fast."],["Microprogrammed CU?","ROM-based microinstructions — flexible, slower."],["Which is faster?","Hardwired — direct hardware signals."],["Which is flexible?","Microprogrammed — update ROM contents."],["RISC uses?","Hardwired CU."],["CISC uses?","Microprogrammed CU."]],
sh:["⚡ Hardwired=Hardware=Fast=Fixed=RISC","⚡ Micro=Memory=Flexible=Slow=CISC","⚡ Draw 6-row comparison table!","⚡ 'Control Memory stores microinstructions' — key phrase!"],
ev:["| Feature | Hardwired | Microprogrammed |","| Implementation | Gates, flip-flops | Microinstructions in ROM |","| Speed | Faster | Slower |","| Flexibility | Fixed | Easily modified |","| Complexity | Complex design | Simpler design |","| Used in | RISC (ARM) | CISC (x86) |","| Modification | Needs re-fabrication | Update control memory |"]},
{id:12,marks:4,pri:"high",unit:"Memory",tags:["virtual memory","paging","page table","MMU","page fault"],
title:"Explain virtual memory and page address mapping.",
def:"Virtual Memory is a memory management technique that provides programs an illusion of more memory than physically available, using disk storage as an extension of RAM.",
pts:["Logical Address = Page Number + Page Offset.","Page Table: maps Page Number → Frame Number in physical RAM.","Physical Address = Frame Number + Page Offset.","Page Fault: requested page not in RAM → OS loads from disk.","MMU (Memory Management Unit): hardware that does the translation.","TLB (Translation Lookaside Buffer): cache for page table — speeds lookup."],
diag:`  CPU generates: Logical Address = [Page No. | Page Offset]
                                    ↓
                              Page Table
                                    ↓
                         Frame Number (Physical RAM)
                                    ↓
  Physical Address = [Frame No. | Page Offset]
  
  Page Fault → OS → Load page from Disk → Resume`,
kws:["Virtual Memory","Paging","Page Table","Frame","MMU","TLB","Page Fault","Logical Address"],
el10:["💻 Computer says 8GB RAM but program needs 12GB.","Virtual memory: 'Use hard drive as fake RAM!'","Memory divided into pages (like book chapters).","Current pages in RAM (fast). Others on disk (slow).","Page Fault = 'That chapter is on the shelf — fetching it!'"],
fc:[["What is virtual memory?","Technique using disk as extension of RAM."],["What is a Page?","Fixed-size block of virtual memory (~4KB)."],["What is a Frame?","Fixed-size block of physical RAM, same size as page."],["What is a Page Fault?","Required page not in RAM — OS loads from disk."],["What does MMU do?","Translates logical to physical address."],["Logical address structure?","Page Number + Page Offset."],["What is TLB?","Cache for page table — speeds up translation."]],
sh:["⚡ Physical Address = Frame# × PageSize + PageOffset","⚡ Page=virtual chunk. Frame=physical chunk. Same size!","⚡ Page Table maps: Page# → Frame#","⚡ Must mention: Page Fault, MMU, TLB, Page Table"],
ev:["Virtual Memory = illusion of large memory using disk.","Address Mapping:","1. CPU generates Logical Address = [Page No. | Page Offset].","2. MMU looks up Page Table: Page No. → Frame No.","3. Physical Address = Frame No. + Page Offset.","4. If page not in RAM: PAGE FAULT → OS loads from disk.","TLB: Cache for page table — reduces translation time."]},
{id:13,marks:3,pri:"medium",unit:"Memory",tags:["cache coherence","snoopy","MESI","multiprocessor"],
title:"What is cache coherence? What is the solution?",
def:"Cache Coherence is the problem in multiprocessor systems where multiple CPUs with private caches hold copies of the same data, and one updates its copy without others knowing.",
pts:["Problem: CPU1&CPU2 cache X=10. CPU1 updates X=50. CPU2 still sees X=10. Incoherent!","Write-Invalidate: Write to X → broadcast INVALIDATE → others mark copy Invalid.","Write-Update: Write to X → broadcast new value → all caches update.","Snoopy Protocol: Each cache controller monitors (snoops) the bus.","MESI States: Modified(M), Exclusive(E), Shared(S), Invalid(I)."],
diag:`  CPU1(X=50) ---|--- Shared Bus ---| CPU2(X=10)
  
  CPU1 writes X=50 → INVALIDATE X broadcast
  CPU2 snoops bus → sees INVALIDATE X
  CPU2 marks X as INVALID
  CPU2 next reads X → fetches X=50 from memory
  
  MESI: M=Modified|E=Exclusive|S=Shared|I=Invalid`,
kws:["Cache Coherence","Snoopy Protocol","MESI","Invalidate","Write-Update","Multiprocessor"],
el10:["📋 Group project: each person has notebook (cache).","Everyone copies X=10. One person changes X=50 silently.","Now everyone has DIFFERENT answers — incoherent!","Solution: When you change X, shout 'X changed!' (Snoopy).","Others erase stale copy (Invalidate), fetch fresh value next time."],
fc:[["Cache coherence problem?","Multiple CPUs cache same data — one updates, others have stale copies."],["Write-invalidate?","Writer broadcasts INVALIDATE → others mark copy Invalid."],["Write-update?","Writer broadcasts new value → all caches update."],["Snoopy Protocol?","Cache controllers monitor shared bus for writes."],["MESI?","Modified, Exclusive, Shared, Invalid — 4 cache line states."]],
sh:["⚡ Snoopy = each cache 'listens to' the bus","⚡ MESI: Modified(dirty)|Exclusive(1 copy)|Shared(many)|Invalid(stale)","⚡ Must mention 'Snoopy Protocol' and 'MESI' for full marks!"],
ev:["Cache Coherence: multiple CPUs hold stale copies of shared data.","Problem: CPU1 X=50 in cache. CPU2 still sees X=10.","Solution 1 — Write-Invalidate: INVALIDATE signal → others mark Invalid.","Solution 2 — Write-Update: broadcast new value to all caches.","Snoopy Protocol: cache controllers snoop shared bus.","MESI: Modified, Exclusive, Shared, Invalid."]},
{id:14,marks:3,pri:"medium",unit:"Parallel Processing",tags:["tightly coupled","loosely coupled","SMP"],
title:"Differentiate tightly coupled and loosely coupled multiprocessor systems.",
def:"Tightly Coupled: multiple CPUs share single memory and OS. Loosely Coupled (Distributed): independent processors, own memory and OS, connected via network.",
pts:[],
diag:`  Feature       | Tightly Coupled   | Loosely Coupled
  --------------|-------------------|-----------------
  Memory        | Shared global     | Distributed (private)
  Communication | Shared memory R/W | Message passing
  Speed         | Fast              | Slower (latency)
  OS            | Single global OS  | Each node has own
  Scalability   | Limited (bus)     | Highly scalable
  Example       | SMP               | Cluster, Grid`,
kws:["Tightly Coupled","Loosely Coupled","Shared Memory","Message Passing","SMP","Cluster"],
el10:["⚔️ Tightly = Army platoon. All share one radio and one map. Fast!","Loosely = Coalition armies. Each has own radio, own map. Messages.","Tightly = FAST (shared memory). Loosely = SLOW (network messages).","Tightly = limited scale. Loosely = infinitely scalable!"],
fc:[["Tightly coupled?","Multiple CPUs sharing single memory and OS."],["Loosely coupled?","Independent processors, own memory/OS, communicate via network."],["Which is faster?","Tightly coupled — shared memory, no network."],["Which scales better?","Loosely coupled — no shared bus bottleneck."],["SMP is?","Symmetric Multiprocessing — tightly coupled architecture."]],
sh:["⚡ Tight=Together=Shared=Fast=Limited","⚡ Loose=Separate=Message=Slow=Scalable","⚡ Include SMP and Cluster as examples!"],
ev:["| Feature | Tightly | Loosely |","| Memory | Shared | Distributed |","| Communication | Shared mem | Message passing |","| Speed | Fast | Slower |","| OS | Single | Each node own |","| Scalability | Limited | Highly scalable |","| Example | SMP | Cluster, Grid |"]},
{id:15,marks:4,pri:"medium",unit:"Instruction Set",tags:["three address","zero address","stack","instruction format"],
title:"Criticize Three-Address and Zero-Address instructions.",
def:"Three-Address: 3 operand fields [Opcode|Dest|Src1|Src2]. Zero-Address: opcode only — uses implicit stack.",
pts:["Three-Address: ADD Y,A,B → Y=A+B. 1 instruction. Original values preserved.","Three-Address Criticism: Long instruction, large memory bandwidth, complex decoder.","Zero-Address: PUSH A; PUSH B; ADD; POP Y (4 instructions).","Zero-Address Advantage: Compact instructions, simple hardware.","Zero-Address Criticism: High instruction count, PUSH/POP overhead."],
diag:`  Problem: Y = A + B
  
  THREE-ADDRESS:     ZERO-ADDRESS (Stack):
  ADD Y, A, B        PUSH A
  (1 instruction)    PUSH B
                     ADD
                     POP Y
                     (4 instructions)`,
kws:["Three-Address","Zero-Address","Stack","PUSH","POP","Instruction Format"],
el10:["📦 Three-addr = order form: 'Add A and B, deliver to Y.' One order!","Zero-addr = cafeteria trays. Push A. Push B. ADD combines top two. Pop to Y.","Three-addr: 1 instruction but VERY LONG.","Zero-addr: SHORT instructions but MANY needed."],
fc:[["Three-address format?","[Opcode|Destination|Source1|Source2]"],["Zero-address format?","[Opcode only] — operands from stack."],["Three-addr criticism?","Long instruction → large memory bandwidth → complex decoder."],["Zero-addr criticism?","High instruction count — many PUSH/POP for simple ops."],["Zero-addr uses?","Stack (LIFO)."]],
sh:["⚡ 3-addr: 1 instruction but LONG. 0-addr: SHORT but MANY.","⚡ Zero-addr = Java Bytecode (JVM is stack-based!)","⚡ Show code side-by-side in exam","⚡ 3-addr='memory bandwidth'; 0-addr='instruction count'"],
ev:["Three-Address: ADD Y,A,B (Y=A+B) — 1 instruction.","Advantage: Fewer instructions, original values preserved.","Criticism: Long word → large memory bandwidth → complex decoder.","Zero-Address (Stack): PUSH A; PUSH B; ADD; POP Y — 4 instructions.","Advantage: Compact instructions, simple hardware.","Criticism: High instruction count — many PUSH/POP overhead."]},
{id:16,marks:4,pri:"medium",unit:"Instruction Set",tags:["two address","three address","X=(a*b)/c+d"],
title:"Program to evaluate X=(a*b)/c+d in two-address and three-address formats.",
def:"Demonstrate X=(a*b)/c+d in two instruction formats. Three-address: all 3 operands explicit. Two-address: dest also = first source.",
pts:["Three-Address: [Opcode, Dest, Src1, Src2]. 3 instructions.","Two-Address: [Opcode, Dest/Src1, Src2]. Needs extra MOV. 5 instructions."],
diag:`  Expression: X = (a*b)/c + d
  
  THREE-ADDRESS (3 instructions):
  MUL R1, a, b   / R1 = a*b
  DIV R2, R1, c  / R2 = (a*b)/c
  ADD X, R2, d   / X = result
  
  TWO-ADDRESS (5 instructions):
  MOV R1, a      / R1 = a
  MUL R1, b      / R1 = a*b
  DIV R1, c      / R1 = (a*b)/c
  ADD R1, d      / R1 = final
  MOV X, R1      / X = result`,
kws:["Two-Address","Three-Address","MUL","DIV","ADD","MOV"],
el10:["🍳 Three-addr = precise chef. 'Mix A and B into bowl C.' One step!","Two-addr = student with one bowl. Reuse it: Mix→divide→add.","Three-addr: 3 instructions. Two-addr: 5 instructions."],
fc:[["Three-addr format?","ADD R1,A,B → R1=A+B (3 operands)."],["Two-addr format?","ADD R1,B → R1=R1+B (dest=first source)."],["3-addr instructions for X=(a*b)/c+d?","3: MUL, DIV, ADD."],["2-addr instructions?","5: MOV, MUL, DIV, ADD, MOV."]],
sh:["⚡ 3-addr=3 instr. 2-addr=5 instr.","⚡ More address fields = fewer instructions (but longer word).","⚡ Two-addr: 'MOV first, then operate' pattern","⚡ Always add / comments in assembly!"],
ev:["Expression: X = (a*b)/c + d","Three-Address:","MUL R1,a,b / DIV R2,R1,c / ADD X,R2,d","Two-Address:","MOV R1,a | MUL R1,b | DIV R1,c | ADD R1,d | MOV X,R1"]},
{id:17,marks:4,pri:"medium",unit:"Assembler",tags:["assembler","pass1","symbol table","location counter"],
title:"Draw and explain flowchart for First Pass of Assembler.",
def:"First Pass scans source code to build the Symbol Table — mapping every label to its memory address. Does NOT generate machine code.",
pts:["Purpose: Build Symbol Table. Assign addresses to all labels.","Location Counter (LC): Tracks current memory address. Starts at 0.","Label found → store (Label, LC) in Symbol Table.","ORG → LC = specified value.","END → terminate Pass 1.","Otherwise → LC = LC + 1."],
diag:`  [Start] → LC = 0
  Read Next Line
  [Label?]→YES→ Store (Label,LC) in Symbol Table
      |NO
  [Pseudo-ORG?]→YES→ LC = specified value
      |NO
  [Pseudo-END?]→YES→ [Stop Pass 1]
      |NO
  LC = LC + 1
  → Back to Read Next Line`,
kws:["Pass 1","Symbol Table","Location Counter","LC","Label","ORG","END"],
el10:["📚 Pass 1 = librarian cataloguing books BEFORE putting on shelves.","Write down: 'Book LOOP is at shelf 150' (symbol table entry).","LC = librarian's current shelf number.","ORG 200 = 'Jump to shelf 200'. END = 'Stop cataloguing'.","Only THEN does Pass 2 actually place books (machine code)."],
fc:[["What does Pass 1 build?","Symbol Table — labels mapped to memory addresses."],["What is LC?","Location Counter — tracks current memory address."],["ORG instruction?","LC set to specified address value."],["END instruction?","Pass 1 terminates."],["Does Pass 1 generate machine code?","No — only Pass 2 does that."]],
sh:["⚡ Pass 1=Scout. Pass 2=Builder.","⚡ LC starts 0. ORG resets it. Label?→Store(Label,LC). END?→Stop.","⚡ Flowchart: 4 decisions: Label?→ORG?→END?→increment"],
ev:["Pass 1 Purpose: Build Symbol Table (label→address).","1. Initialize LC = 0.","2. Read next source line.","3. If label: store (Label,LC) in Symbol Table.","4. If ORG: LC = specified value.","5. If END: stop.","6. Else: LC=LC+1. Go to step 2."]},
{id:18,marks:4,pri:"medium",unit:"CPU Architecture",tags:["stack","register stack","memory stack","LIFO","SP"],
title:"Explain register stack and memory stack.",
def:"Stack is a LIFO data structure. Register Stack: inside CPU using flip-flop registers. Memory Stack: dedicated RAM region tracked by Stack Pointer (SP).",
pts:["Register Stack: Inside CPU, flip-flops, hardware SP. Fast (0 bus cycles). Limited size.","Memory Stack: Region of RAM. SP holds top address. Slower (memory R/W). Large size.","PUSH: SP = SP-1, then M[SP] = data.","POP: data = M[SP], then SP = SP+1.","SP always points to top of stack."],
diag:`  REGISTER STACK          MEMORY STACK
  ┌─────────────┐          RAM:
  │ REG[0](top) │← SP      Addr N:   [TOP] ← SP
  │ REG[1]      │          Addr N+1: [   ]
  │ ...         │          ...
  └─────────────┘
  Inside CPU (fast, small)  In RAM (slower, large)`,
kws:["Stack","LIFO","Register Stack","Memory Stack","Stack Pointer","SP","PUSH","POP"],
el10:["🍽️ Stack = plate dispenser. Last plate in = first out (LIFO)!","Register Stack = small dispenser INSIDE kitchen (CPU). Fast, ~10 plates.","Memory Stack = big dispenser in back (RAM). Slower, 1000 plates!","SP = spring inside — always points to top plate."],
fc:[["What is LIFO?","Last In First Out — last pushed is first popped."],["Register stack?","Stack inside CPU using flip-flops — fast, limited."],["Memory stack?","Stack in RAM — slower but large. SP tracks top."],["SP points to?","Current top element of the stack."],["PUSH steps?","SP=SP-1, then M[SP]=data."],["POP steps?","data=M[SP], then SP=SP+1."]],
sh:["⚡ PUSH=SP down, write. POP=read, SP up.","⚡ Register=fast+small. Memory=slow+large.","⚡ SP tracks top — critical for subroutine calls!"],
ev:["Stack: LIFO (Last-In-First-Out).","Register Stack: Inside CPU, flip-flops. Fast, limited. Overflow→FULL flag.","Memory Stack: RAM region. SP holds top address. Slow, large.","PUSH: SP=SP-1, M[SP]=data.","POP: data=M[SP], SP=SP+1."]},
{id:19,marks:4,pri:"medium",unit:"I/O & Interrupts",tags:["daisy chain","interrupt","priority","INTACK"],
title:"Explain daisy chain priority interrupt.",
def:"Daisy Chain Priority Interrupt is hardware-based priority where I/O devices are connected in series. The CPU's INTACK signal propagates through the chain until the requesting device is found.",
pts:["All devices share one INTR line — CPU knows interrupt happened, not which device.","CPU sends INTACK down the chain after acknowledging.","INTACK wired in series — highest priority device first.","Signal hits D1 first: if D1 requested → blocks, sends vector address.","If D1 didn't request → passes INTACK to D2. And so on.","Priority = physical position. D1 = highest, last = lowest."],
diag:`  CPU ← INTR (shared) ← Device1 ← Device2 ← Device3
  CPU → INTACK → Device1 → Device2 → Device3
  
  Device2 requested:
  1. Device2 raises INTR
  2. CPU sends INTACK
  3. Device1: not me → passes onward
  4. Device2: yes me → intercepts, sends vector address
  5. CPU executes Device2's ISR`,
kws:["Daisy Chain","INTR","INTACK","Priority","Vector Address","ISR"],
el10:["🏐 Daisy chain = passing a ball in a line of players.","All shout 'I need the ball!' (INTR).","Coach throws ball from left (INTACK).","Player 1 grabs if needed, else passes to Player 2...","Closest to coach = highest priority!"],
fc:[["Daisy chain interrupt?","INTACK passes through devices in series; first needing it wins."],["INTR?","Interrupt Request — shared line all devices use."],["INTACK?","Interrupt Acknowledge — CPU response propagating through chain."],["Priority determined by?","Physical position — closest to CPU = highest."],["Vector address?","Device's ISR address — sent to CPU when device intercepts INTACK."]],
sh:["⚡ Daisy=Series. Priority=Position. Closer=Higher.","⚡ INTR: device→CPU. INTACK: CPU→device chain.","⚡ Advantage: no software polling. Disadvantage: starvation."],
ev:["Daisy Chain = hardware priority via series INTACK line.","1. Device raises INTR.","2. CPU sends INTACK signal.","3. INTACK propagates highest→lowest priority.","4. Requesting device intercepts, sends vector address.","5. CPU jumps to ISR.","Priority: position. Disadvantage: low-priority starvation."]},
{id:20,marks:3,pri:"low",unit:"Memory",tags:["main memory","RAM","ROM","memory map"],
title:"How is main memory useful? Explain memory address map of RAM and ROM.",
def:"Main Memory is the CPU's primary working area. All programs must be in RAM/ROM for CPU access. Memory address map assigns address ranges to different chips.",
pts:["Why: CPU can't execute from disk. Direct CPU access. Holds OS, code, data.","RAM: Read/Write, Volatile — stores running programs.","ROM: Read Only, Non-volatile — stores BIOS, boot programs.","Memory Map: High-order bits = chip select. Low bits = offset within chip.","Example: 512B RAM (0000-01FF) + 512B ROM (0200-03FF). A9=0→RAM, A9=1→ROM."],
diag:`  Address Space (1KB = 10 address lines):
  0x0000 ┌──────────────┐
         │   RAM        │ 512 bytes (A9=0)
         │  0000h-01FFh │
  0x01FF └──────────────┘
  0x0200 ┌──────────────┐
         │   ROM        │ 512 bytes (A9=1)
         │  0200h-03FFh │
  0x03FF └──────────────┘`,
kws:["Main Memory","RAM","ROM","Memory Map","Chip Select","Volatile"],
el10:["🖥️ Main memory = your desk. Hard drive = filing cabinet.","CPU only works with what's on desk (main memory).","RAM = desk area (writable, cleared when off).","ROM = printed label glued to desk (read-only, survives poweroff).","Memory map = street map — each building (chip) has address range."],
fc:[["Why main memory?","CPU can't execute from disk — must be in RAM/ROM."],["RAM vs ROM?","RAM=volatile,R/W. ROM=non-volatile,R-only."],["What is memory map?","Assigns address ranges to specific chips."],["Chip selected how?","High-order address bits as chip select signals."],["Volatile memory?","Loses data when power removed (RAM)."]],
sh:["⚡ RAM=Read/Write+Volatile. ROM=ReadOnly+Non-volatile.","⚡ High bits=chip select. Low bits=offset within chip.","⚡ n address lines → 2^n locations.","⚡ Draw memory map with address ranges!"],
ev:["Main Memory stores programs/data for direct CPU access.","RAM: volatile, R/W — running programs. ROM: non-volatile, R — BIOS.","Memory Map: address ranges by decoding high-order address bits.","Example: 512B RAM (0x0000–0x01FF) + 512B ROM (0x0200–0x03FF).","A9=0→RAM. A9=1→ROM. Low bits = offset within chip."]},
{id:21,marks:4,pri:"medium",unit:"Instruction Set",tags:["BUN","BSA","MRI","branch","subroutine"],
title:"Describe BUN and BSA memory reference instructions in detail.",
def:"BUN (Branch Unconditionally) and BSA (Branch and Save Address) are MRI instructions controlling program flow via the Program Counter (PC).",
pts:["BUN: Forces CPU to jump to new address. No condition checked.","BUN Micro-op: PC ← AR (jump to effective address).","Used for: unconditional jumps, infinite loops (like goto).","BSA: Jump but first save return address. Like a function call.","BSA Step 1: M[AR] ← PC (save current PC at target address).","BSA Step 2: PC ← AR+1 (jump to subroutine body).","Return: BUN M[AR] — indirect branch back to saved address."],
diag:`  BUN (Branch Unconditionally):
  PC ← AR   (jump, no save)
  
  BSA (Branch and Save Address):
  Step 1: M[AR] ← PC  (save return address at AR)
  Step 2: PC ← AR+1   (jump to subroutine)
  
  To RETURN from subroutine:
  BUN M[AR]  (indirect branch to saved address)`,
kws:["BUN","BSA","MRI","PC","AR","Subroutine","Branch","Micro-operation"],
el10:["🗺️ BUN = Road sign: 'Detour! Go to Street 150.' No condition, just go.","BSA = Leaving home with sticky note: 'I'm at Shop, Street 50.'","Sticky note = saved return address M[AR].","After shop (subroutine), check note to return home!","BUN M[AR] = reading the sticky note."],
fc:[["What does BUN do?","Unconditional branch — PC←AR."],["What does BSA do?","Branch and save return address — subroutine call."],["BSA micro-op 1?","M[AR]←PC (save return address)."],["BSA micro-op 2?","PC←AR+1 (jump to subroutine)."],["How to return from BSA?","BUN M[AR] — indirect branch to saved address."],["BUN vs BSA?","BUN just jumps. BSA saves return address before jumping."]],
sh:["⚡ BUN=Goto. BSA=Function call.","⚡ BUN micro-op: just 'PC←AR'","⚡ BSA: 'M[AR]←PC' then 'PC←AR+1'. Two steps.","⚡ Return: 'BUN M[X]' where X used in BSA."],
ev:["BUN (Branch Unconditionally):","Micro-op: PC←AR. CPU jumps unconditionally.","BSA (Branch and Save Address):","Micro-op 1: M[AR]←PC (save return address).","Micro-op 2: PC←AR+1 (jump to subroutine).","To RETURN: execute BUN M[AR]."]},
{id:22,marks:3,pri:"medium",unit:"CPU Architecture",tags:["subroutine","CALL","RETURN","stack","micro-operation"],
title:"Explain subroutine call and return with micro-operations.",
def:"Subroutine CALL saves return address on stack and jumps to subroutine. RETURN pops return address from stack and resumes execution.",
pts:["CALL: 1. SP←SP-1, 2. M[SP]←PC, 3. PC←EffectiveAddress.","RETURN: 1. PC←M[SP], 2. SP←SP+1.","Stack enables nested calls — each CALL pushes new return address."],
diag:`  BEFORE CALL:   DURING CALL:       AFTER RETURN:
  PC = 100       Stack: [100]        PC = 101 (resumes)
  SP = N         SP = N-1            SP = N (restored)
                 PC = Sub_Addr
  CALL: SP=SP-1, M[SP]=PC, PC=Sub
  RETURN: PC=M[SP], SP=SP+1`,
kws:["Subroutine","CALL","RETURN","Stack Pointer","SP","PC","Push","Pop"],
el10:["🎮 Subroutine = side quest in a game.","CALL: bookmark current position (push PC to stack).","Do the side quest (execute subroutine).","RETURN: grab bookmark (pop PC), return to exact position!","Nested calls = side quest within side quest. Stack holds ALL bookmarks!"],
fc:[["CALL micro-operations?","SP←SP-1, M[SP]←PC, PC←EffectiveAddress."],["RETURN micro-operations?","PC←M[SP], SP←SP+1."],["Why use stack?","Allows nested calls — each CALL pushes, RETURN pops."],["SP direction?","SP decrements on CALL, increments on RETURN."]],
sh:["⚡ CALL='Push PC, jump'. RETURN='pop PC'.","⚡ SP goes DOWN on CALL, UP on RETURN.","⚡ Nested calls work because stack is LIFO!"],
ev:["Subroutine CALL micro-operations:","1. SP←SP-1 (make space).","2. M[SP]←PC (save return address).","3. PC←Effective Address (jump).","Subroutine RETURN micro-operations:","1. PC←M[SP] (restore address).","2. SP←SP+1 (free space).","Stack enables nested subroutine calls."]},
{id:23,marks:4,pri:"medium",unit:"Memory",tags:["SRAM","DRAM","cache","refresh","comparison"],
title:"Compare SRAM and DRAM.",
def:"SRAM (Static RAM) stores data using flip-flops — holds data as long as powered. DRAM (Dynamic RAM) uses capacitors that leak and must be periodically refreshed.",
pts:[],
diag:`  Feature      | SRAM (Static)        | DRAM (Dynamic)
  -------------|----------------------|--------------------
  Storage      | Flip-flops           | Capacitors
  Refresh      | Not needed           | Required (~few ms)
  Speed        | Very fast            | Slower
  Density      | Low (6 transistors)  | High (1T+1C per bit)
  Cost         | Very expensive       | Cheap
  Power        | Higher               | Lower
  Usage        | CPU Cache (L1,L2,L3) | System RAM`,
kws:["SRAM","DRAM","Flip-flop","Capacitor","Refresh","Cache","Main Memory"],
el10:["📋 SRAM = whiteboard. Write on it — stays while powered. Fast!","DRAM = wet chalkboard. Words fade (cap discharge). Need re-writing (refresh).","SRAM: expensive (6T/bit) but FAST → CPU cache.","DRAM: cheap (1T+1C/bit) → your 8GB/16GB system RAM."],
fc:[["SRAM storage?","Flip-flop circuits."],["DRAM storage?","Capacitors — charge = 1, no charge = 0."],["Why DRAM needs refresh?","Capacitors leak charge — data lost without recharge."],["Which is faster?","SRAM — no refresh delay."],["Which is cheaper?","DRAM — 1T+1C vs 6T in SRAM."],["SRAM used where?","CPU Cache (L1, L2, L3)."],["DRAM used where?","System main memory."]],
sh:["⚡ SRAM=Stable+Speed+Cache (all S's!)","⚡ DRAM=Dynamic+Dense+cheap (all D's!)","⚡ Transistors: SRAM=6T, DRAM=1T+1C","⚡ 6-row table = full marks!"],
ev:["| Feature | SRAM | DRAM |","| Storage | Flip-flops | Capacitors |","| Refresh | Not needed | Required |","| Speed | Very fast | Slower |","| Density | Low (6T/bit) | High (1T+1C) |","| Cost | Expensive | Cheap |","| Usage | CPU Cache | System RAM |"]},
{id:24,marks:7,pri:"high",unit:"CPU Architecture",tags:["instruction cycle","fetch","decode","execute","interrupt"],
title:"Explain different phases of Instruction Cycle with neat diagram.",
def:"The Instruction Cycle is the fundamental heartbeat of the CPU — every instruction goes through Fetch, Decode, Read EA, Execute, and Check Interrupt phases repeatedly.",
pts:["Phase 1 — Fetch: AR←PC, IR←M[AR], PC←PC+1.","Phase 2 — Decode: Control unit reads IR opcode. Determines type and addressing mode.","Phase 3 — Read EA: If indirect → AR←M[AR] (extra memory read).","Phase 4 — Execute: Carry out ALU op, data move, or jump.","Phase 5 — Check Interrupt: If IEN=1 and pending → save PC → IEN=0 → jump to ISR.","Then: Go back to Fetch. Cycle repeats indefinitely."],
diag:`  ┌──────────────────────┐
  │  FETCH PHASE         │
  │  AR←PC, IR←M[AR]     │
  │  PC←PC+1             │
  └──────────┬───────────┘
             │
  ┌──────────▼───────────┐
  │  DECODE PHASE        │
  │  Decode IR opcode    │
  │  Check address mode  │
  └──────────┬───────────┘
             │
  ┌──────────▼───────────┐
  │  READ EFFECTIVE ADDR │
  │  If indirect:        │
  │  AR ← M[AR]          │
  └──────────┬───────────┘
             │
  ┌──────────▼───────────┐
  │  EXECUTE PHASE       │
  │  ALU / Data / Jump   │
  └──────────┬───────────┘
             │
  ┌──────────▼───────────┐
  │  CHECK INTERRUPT     │
  │  IEN=1 & pending?    │
  │  → Save PC → ISR     │
  └──────────┬───────────┘
             │
     [Back to FETCH — repeat]`,
kws:["Instruction Cycle","Fetch","Decode","Execute","Interrupt","AR","PC","IR","IEN","ISR"],
el10:["👨‍🍳 Instruction cycle = cooking a recipe, every single time.","Fetch = Go to cookbook, find the recipe (get instruction from memory).","Decode = Read recipe to understand what to cook.","Read EA = 'Ingredients in pantry B' → go find pantry B (indirect).","Execute = Actually cook the dish (ALU operation).","Check Interrupt = 'Anyone ring the doorbell?' Then next recipe!"],
fc:[["Instruction Cycle phases?","Fetch→Decode→ReadEA→Execute→CheckInterrupt→repeat."],["Fetch micro-operations?","AR←PC, IR←M[AR], PC←PC+1."],["What happens in Decode?","Control unit reads IR opcode to determine instruction type."],["When is Read EA needed?","Only for indirect addressing."],["Check Interrupt condition?","IEN=1 AND interrupt pending→save PC→IEN=0→jump ISR."],["IR holds what?","The fetched instruction."],["AR gets value from?","PC during Fetch phase."]],
sh:["⚡ Mnemonic: FD-REA-EX-CI = Fetch,Decode,ReadEA,Execute,CheckIntr","⚡ Fetch = 3 exact steps: AR←PC, IR←M[AR], PC←PC+1","⚡ Read EA only for INDIRECT — highlight this!","⚡ For 7-mark: Draw full flowchart + all micro-operations"],
ev:["Instruction Cycle phases:","1. Fetch: AR←PC, IR←M[AR], PC←PC+1.","2. Decode: Decode IR opcode. Determine type and mode.","3. Read EA: If indirect → AR←M[AR].","4. Execute: ALU / data transfer / branch.","5. Check Interrupt: IEN=1&pending→save PC,IEN=0,jump ISR.","6. Go back to Fetch. Repeats for every instruction."]}
];

  "Tight=shared,fast,SMP; Loose=distributed,scalable,Cluster",
  "3-addr=1 long instr; 0-addr=many tiny stack instrs",
  "3-addr:MUL,DIV,ADD(3); 2-addr:MOV,MUL,DIV,ADD,MOV(5)",
  "Scan code, build Symbol Table (label→address), LC increments",
  "RegStack=CPU,fast,small; MemStack=RAM,slow,large; LIFO",
  "INTACK propagates series; first requesting device intercepts",
  "RAM=volatile,0000-01FF; ROM=non-volatile,0200-03FF; A9 selects",
  "BUN: PC←AR; BSA: M[AR]←PC then PC←AR+1; Return: BUN M[AR]",
  "CALL: SP-1,Push PC,Jump; RETURN: Pop PC,SP+1",
  "SRAM=flip-flop,fast,cache; DRAM=capacitor,refresh,main mem",
  "Fetch→Decode→ReadEA→Execute→CheckInterrupt→Repeat forever"
];

// ─── Icons ───
const UNIT_ICONS={"I/O & Interrupts":"⚡","Assembler":"🔧","Instruction Set":"📋","CPU Architecture":"🖥️","Arithmetic":"🔢","Memory":"💾","Parallel Processing":"⚙️"};
const TABS=["📝 GTU Answer","🧠 EL10","🃏 Flashcards","⚡ Hacks","✍️ Exam Ver"];

let curView="home",curQ=1,curTab=0,srchTxt="";

// ─── Helpers ───
const bc=m=>m==7?"b7":m==4?"b4":"b3";
const pc=p=>p=="high"?"chip-hi":p=="medium"?"chip-med":"chip-lo";
const pl=p=>p=="high"?"⭐ Important":p=="medium"?"📌 Standard":"📎 Short";

// ─── SIDEBAR ───
function renderSidebar(){
  const qs=srchTxt?QS.filter(q=>q.title.toLowerCase().includes(srchTxt)||q.tags.some(t=>t.includes(srchTxt))||q.unit.toLowerCase().includes(srchTxt)):QS;
  document.getElementById("sidebar").innerHTML=
    `<div class="sb-lbl">Questions (${qs.length})</div>`+
    qs.map(q=>`<div class="qi ${curView==='question'&&curQ===q.id?'on':''}" onclick="goQ(${q.id})">
      <span class="qn">Q${String(q.id).padStart(2,'0')}</span>
      <span class="qt">${q.title.substring(0,46)}${q.title.length>46?"...":""}</span>
      <span class="qb ${bc(q.marks)}">${q.marks}M</span>
    </div>`).join("");
}

// ─── HOME ───
function renderHome(){
  const uc={};QS.forEach(q=>{uc[q.unit]=(uc[q.unit]||0)+1});
  document.getElementById("content").innerHTML=`
  <div class="hero">
    <div class="htag">GTU · Semester 4 · BE04000251 · AIT</div>
    <div class="htitle">COA <em>Master</em> Revision</div>
    <div class="hdesc">Complete exam-ready system — GTU model answers, EL10 analogies, flashcards, memory hacks & exam writing versions for all 24 questions.</div>
    <div class="stats">
      <div class="stat"><div class="sn">24</div><div class="sl">Questions</div></div>
      <div class="stat"><div class="sn">144+</div><div class="sl">Flashcards</div></div>
      <div class="stat"><div class="sn">7</div><div class="sl">Units</div></div>
      <div class="stat"><div class="sn">5</div><div class="sl">Sections / Q</div></div>
    </div>
  </div>
  <div class="sec-title">Browse by Unit</div>
  <div class="ugrid">${Object.entries(uc).map(([u,c])=>`
    <div class="ucard" onclick="setView('questions')">
      <div class="uico">${UNIT_ICONS[u]||"📚"}</div>
      <div class="unm">${u}</div>
      <div class="ucnt">${c} question${c>1?"s":""}</div>
    </div>`).join("")}</div>
  <div class="sec-title">Priority — 7 Mark Questions</div>
  ${QS.filter(q=>q.marks===7).map(q=>`
    <div class="hq-item" onclick="goQ(${q.id})">
      <span class="hqn">Q${q.id}</span>
      <span style="flex:1;font-size:13px;color:var(--txt)">${q.title}</span>
      <span class="qb b7">7M</span>
    </div>`).join("")}`;
}

// ─── QUESTIONS LIST ───
function renderQuestions(){
  const qs=srchTxt?QS.filter(q=>q.title.toLowerCase().includes(srchTxt)||q.tags.some(t=>t.includes(srchTxt))||q.unit.toLowerCase().includes(srchTxt)):QS;
  document.getElementById("content").innerHTML=`
  <div style="font-family:'Oswald',sans-serif;font-size:20px;font-weight:500;letter-spacing:1px;text-transform:uppercase;margin-bottom:16px;color:var(--txt)">
    ${srchTxt?`Results: "${srchTxt}"`:"All Questions"}
    <span style="font-size:12px;font-weight:400;color:var(--txt3);margin-left:10px;font-family:'Inter',sans-serif;text-transform:none">${qs.length} found</span>
  </div>`+
  qs.map(q=>`
  <div class="hq-item" style="flex-direction:column;align-items:flex-start;gap:8px" onclick="goQ(${q.id})">
    <div style="display:flex;gap:9px;align-items:center">
      <span class="chip chip-q">Q${q.id}</span>
      <span class="qb ${bc(q.marks)}">${q.marks}M</span>
      <span style="font-size:10px;color:var(--txt3);letter-spacing:.5px;text-transform:uppercase">${q.unit}</span>
    </div>
    <div style="font-size:13.5px;font-weight:500;color:var(--txt)">${q.title}</div>
    <div style="display:flex;gap:5px;flex-wrap:wrap">${q.tags.slice(0,4).map(t=>`<span class="tag">${t}</span>`).join("")}</div>
  </div>`).join("");
}

// ─── QUESTION DETAIL ───
function renderQuestion(){
  const q=QS.find(x=>x.id===curQ);if(!q)return;
  document.getElementById("content").innerHTML=`
  <div class="qhdr">
    <div class="qmeta">
      <span class="chip chip-q">Q${q.id}</span>
      <span class="qb ${bc(q.marks)}" style="font-size:12px;padding:4px 11px">${q.marks} Marks</span>
      <span class="chip ${pc(q.pri)}">${pl(q.pri)}</span>
      <span class="tag">${q.unit}</span>
    </div>
    <div class="qtitle">${q.title}</div>
    <div class="tags">${q.tags.slice(0,5).map(t=>`<span class="tag">${t}</span>`).join("")}</div>
  </div>
  <div class="tabs">${TABS.map((t,i)=>`<button class="tb ${curTab===i?"on":""}" onclick="setTab(${i})">${t}</button>`).join("")}</div>
  ${getTab(q,curTab)}
  <div class="qnav">
    ${q.id>1?`<button class="qnb" onclick="goQ(${q.id-1})">← Q${q.id-1} Previous</button>`:""}
    ${q.id<24?`<button class="qnb" onclick="goQ(${q.id+1})">Q${q.id+1} Next →</button>`:""}
  </div>`;
}

// ─── TAB CONTENT ───
function getTab(q,t){
  if(t===0)return`<div class="panel">
    <div class="ptitle blu">📌 Definition</div>
    <div class="def">${q.def}</div>
    ${q.pts&&q.pts.length?`<div class="ptitle blu" style="margin-top:14px">🔹 Key Points</div><ul class="pts">${q.pts.map(p=>`<li>${p}</li>`).join("")}</ul>`:""}
    ${q.diag?`<div class="ptitle blu" style="margin-top:14px">📐 Diagram</div><div class="diag">${q.diag}</div>`:""}
    <div class="ptitle blu" style="margin-top:14px">🔑 Keywords</div>
    <div class="kws">${q.kws.map(k=>`<span class="kw">${k}</span>`).join("")}</div>
  </div>`;
  if(t===1)return`<div class="el10p">
    <div class="ptitle gold">🧠 EL10 — Explain Like I'm 10</div>
    ${q.el10.map(l=>`<div class="el10l">${l}</div>`).join("")}
  </div>`;
  if(t===2)return`<div class="panel">
    <div class="ptitle blu">🃏 Flashcards (${q.fc.length})</div>
    ${q.fc.map(([fq,fa],i)=>`<div class="fcard"><div class="fq">Q${i+1}: ${fq}</div><div class="fa">→ ${fa}</div></div>`).join("")}
  </div>`;
  if(t===3)return`<div class="panel">
    <div class="ptitle pur">⚡ Quick Revision Hacks</div>
    ${q.sh.map(s=>`<div class="sc">${s}</div>`).join("")}
  </div>`;
  if(t===4)return`<div class="exam-wrap">
    <div class="ptitle grn">✍️ Exam Writing Version — Write This for Full Marks</div>
    ${q.ev.map(l=>`<div class="ev">${l}</div>`).join("")}
  </div>`;
}

// ─── REVISION ───
function renderRevision(){
  document.getElementById("content").innerHTML=`<div class="panel">
  <div class="ptitle red" style="font-size:13px;margin-bottom:16px">⚡ Last-Day Quick Revision — All 24 Questions</div>
  ${QS.map((q,i)=>`
    <div class="rev-row" onclick="goQ(${q.id})">
      <span class="rev-q">Q${q.id}</span>
      <span class="rev-t">${q.title.substring(0,42)}...</span>
      <span class="qb ${bc(q.marks)}" style="margin-right:8px">${q.marks}M</span>
      <span class="rev-a">${OL[i]}</span>
    </div>`).join("")}
  </div>`;
}

// ─── NAVIGATION ───
function setView(v){
  curView=v;
  ["nb-home","nb-qs","nb-rev"].forEach(id=>document.getElementById(id).classList.remove("on"));
  if(v==="home")document.getElementById("nb-home").classList.add("on");
  else if(v==="questions"||v==="question")document.getElementById("nb-qs").classList.add("on");
  else if(v==="revision")document.getElementById("nb-rev").classList.add("on");
  renderSidebar();
  if(v==="home")renderHome();
  else if(v==="questions")renderQuestions();
  else if(v==="question")renderQuestion();
  else if(v==="revision")renderRevision();
}

function goQ(id){curQ=id;curTab=0;setView("question")}
function setTab(i){curTab=i;renderQuestion()}
function doSearch(){
  srchTxt=document.getElementById("srch").value.toLowerCase();
  if(srchTxt&&curView!=="question"&&curView!=="revision")setView("questions");
  else{renderSidebar();if(curView==="questions")renderQuestions();}
}

setView("home");
</script>
</body>
</html>
